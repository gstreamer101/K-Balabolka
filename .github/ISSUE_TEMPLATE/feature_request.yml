name: 기능 요청
description: AnnoySpeaker에 새 기능 또는 개선을 제안합니다.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        제안 전에 비슷한 기능 요청이 이미 있는지 검색해 주세요.
        큰 변경이라면 PR 전에 이 이슈로 먼저 방향을 합의하는 것이 시간을 아낍니다.

  - type: textarea
    id: motivation
    attributes:
      label: 동기 — 어떤 문제 / 불편을 해결하나요?
      description: "현재 어떤 시나리오에서 어떤 마찰이 있는지 구체적으로."
      placeholder: |
        예: 5만 자 이상의 텍스트를 매번 잘라서 재생하기 번거롭다.
            현재는 사용자가 직접 챕터로 나눠야 한다.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 제안 — 어떻게 해결하면 좋을까요?
      description: "구체적인 UI / 동작 / API. 모르겠으면 방향만 적어도 됩니다."
      placeholder: |
        예: 입력 텍스트를 단락 단위로 자동 분할하고,
            현재 재생 중인 단락을 GUI에서 하이라이트 표시.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 대안 — 검토한 다른 방법이 있다면
      description: "있는 경우만. 없으면 비워두셔도 됩니다."
      placeholder: |
        예: 외부 텍스트 분할 도구를 권장하는 방법도 있지만 외부 의존성이 늘어남.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: 추가 컨텍스트
      description: "참고 자료, 스크린샷, 비슷한 기능을 가진 다른 앱 링크 등."
    validations:
      required: false
