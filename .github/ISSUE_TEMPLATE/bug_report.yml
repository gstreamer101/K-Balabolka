name: 버그 리포트
description: K-Balabolka의 버그를 신고합니다.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## 시작하기 전에

        - 빌드/실행 문제는 먼저 [BUILD.md "자주 만나는 문제"](../blob/main/BUILD.md#6-자주-만나는-문제)를 확인해 주세요.
        - TTS 동작은 **환경에 매우 민감**합니다. 아래 환경 정보를 빠짐없이 채워주셔야 재현이 가능합니다.

  - type: input
    id: macos-version
    attributes:
      label: macOS 버전
      description: "터미널에서 `sw_vers` 명령 결과의 `ProductVersion` 값"
      placeholder: "예: 26.4 (Tahoe), 15.4 (Sequoia) 등"
    validations:
      required: true

  - type: dropdown
    id: chip
    attributes:
      label: 칩 종류
      description: Apple → 메뉴 → 이 Mac에 관하여 → "칩" 항목
      options:
        - Apple Silicon (M1)
        - Apple Silicon (M2)
        - Apple Silicon (M3)
        - Apple Silicon (M4)
        - Apple Silicon (기타)
        - Intel
    validations:
      required: true

  - type: input
    id: gstreamer-version
    attributes:
      label: GStreamer 버전
      description: "`PKG_CONFIG_LIBDIR=/Library/Frameworks/GStreamer.framework/Versions/1.0/lib/pkgconfig pkg-config --modversion gstreamer-1.0` 결과"
      placeholder: "예: 1.28.2"
    validations:
      required: true

  - type: input
    id: voice
    attributes:
      label: 사용한 음성 (voice id 또는 로케일)
      description: "GUI에서 선택한 음성 이름 또는 voice id. CLI 사용 시 `voice` 속성 값."
      placeholder: "예: com.apple.voice.compact.ko-KR.Yuna 또는 ko-KR (기본)"
    validations:
      required: true

  - type: textarea
    id: input-text
    attributes:
      label: 재현에 사용한 텍스트
      description: |
        실제로 입력한 텍스트 (또는 특성을 그대로 보존한 최소 샘플).
        **한국어 / 영어 / 혼합 여부**와 **글자 수 대략적인 규모**(예: 500자, 50,000자)를 함께 적어주세요.
        긴 텍스트면 첨부 파일로 올리거나 gist 링크를 남겨주세요.
      placeholder: |
        예시:
          - 언어: 한국어
          - 글자 수: 약 1,200자
          - 텍스트:
              안녕하세요, ...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: 재현 절차
      description: "위 텍스트로 어떤 조작을 해서 버그가 일어났는지 단계별로."
      placeholder: |
        1. GUI를 실행한다
        2. 위 텍스트를 텍스트박스에 붙여넣는다
        3. 재생 버튼을 누른다
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대한 동작
      placeholder: "예: 한국어 음성이 끊김 없이 끝까지 재생되어야 한다."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
      placeholder: "예: 800자 부근에서 재생이 멈추고 더 이상 진행되지 않는다."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 관련 로그 / 출력
      description: |
        터미널에서 GUI를 실행했다면 그 출력, 또는 `gst-launch-1.0 -v` 같은 verbose 로그.
        에러 메시지의 스택 트레이스가 있다면 함께. (선택 사항)
      render: shell
    validations:
      required: false
